title: Question
labels: ["question"]

body:
  - type: textarea
    attributes:
      label: Describe your question
      description: Please describe the question clearly. Include errors, behavior, or steps.
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Environment
      options:
        - SaaS
        - Self-Hosted
    validations:
      required: true

  - type: input
    attributes:
      label: Version (if Self-Hosted)
      description: Mention version if applicable

  - type: textarea
    attributes:
      label: Additional Details
      description: Logs, screenshots, or extra context

  - type: checkboxes
    attributes:
      label: Pre-Submission Checklist
      options:
        - label: I have checked existing issues and discussions
          required: true
