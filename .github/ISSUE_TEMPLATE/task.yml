name: Task
description: Create a new task

body:
  - type: dropdown
    id: type
    attributes:
      label: Issue Type
      options:
        - Bug
        - Feature
        - Task
        - Documentation
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Clearly describe the task or issue
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance Criteria
      placeholder: What defines completion?

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce (for bugs)

  - type: textarea
    id: logs
    attributes:
      label: Logs / References
      placeholder: Logs, screenshots, links, etc.
