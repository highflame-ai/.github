name: Task
description: Create a task, bug, or feature request
title: "[TASK] "
labels: ["task"]

body:
  - type: dropdown
    id: type
    attributes:
      label: Type
      options:
        - Bug
        - Feature
        - Task
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Critical
        - High
        - Medium
        - Low

  - type: input
    id: service
    attributes:
      label: Service / Component
      placeholder: e.g. auth-service, frontend, API

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Dev
        - SaaS

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: Describe the issue / task
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps (if applicable)
      placeholder: Steps to reproduce (for bugs)

  - type: textarea
    id: expected
    attributes:
      label: Expected Outcome

  - type: textarea
    id: actual
    attributes:
      label: Actual Outcome

  - type: textarea
    id: logs
    attributes:
      label: Logs / Errors

  - type: input
    id: owner
    attributes:
      label: Owner

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - Critical
        - High
        - Medium
        - Low
